<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing in — PNWAV8R</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .cb-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cb-card {
            background: white;
            border-radius: 20px;
            padding: 50px 44px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            min-width: 280px;
        }
        .cb-logo { font-size: 2em; font-weight: 900; letter-spacing: 3px; color: #2c3e50; margin-bottom: 24px; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #e9ecef;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .cb-msg { color: #7f8c8d; font-size: 0.95em; }
        .cb-error { color: #dc3545; font-size: 0.9em; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="cb-wrap">
        <div class="cb-card">
            <div class="cb-logo">PNWAV8R</div>
            <div class="spinner"></div>
            <div class="cb-msg" id="cbMsg">Signing you in…</div>
            <div class="cb-error" id="cbError"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script>
        let done = false;

        async function checkAndRedirect(session) {
            if (done) return;
            done = true;

            // Check membership — look up by id first, fall back to email
            let { data: member } = await _supabase
                .from('members')
                .select('id, membership_active')
                .eq('id', session.user.id)
                .single();

            if (!member) {
                // Google auth may have created a new UUID — try matching by email
                const { data: byEmail } = await _supabase
                    .from('members')
                    .select('id, membership_active')
                    .eq('email', session.user.email)
                    .single();

                if (byEmail) {
                    // Update the member row to use the new Google auth UUID
                    await _supabase
                        .from('members')
                        .update({ id: session.user.id })
                        .eq('email', session.user.email);
                    member = byEmail;
                }
            }

            if (!member || !member.membership_active) {
                await _supabase.auth.signOut();
                document.getElementById('cbMsg').textContent = '';
                document.getElementById('cbError').innerHTML =
                    'Access denied. Your account is pending approval.<br>' +
                    'Contact your club admin to request access.';
                return;
            }

            window.location.replace('/dashboard.html');
        }

        // Let the SDK handle everything (PKCE code exchange + hash tokens)
        // and fire SIGNED_IN when the session is ready
        _supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session) {
                checkAndRedirect(session);
            }
        });

        // Also check immediately in case session is already established
        _supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) checkAndRedirect(session);
        });

        // Timeout fallback after 15 seconds
        setTimeout(() => {
            if (!done) {
                done = true;
                document.getElementById('cbMsg').textContent = '';
                document.getElementById('cbError').textContent = 'Sign-in timed out. Redirecting to login…';
                setTimeout(() => window.location.replace('/login.html'), 2000);
            }
        }, 15000);
    </script>
</body>
</html>
