<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing in — PNWAV8R</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(160deg, #0C1F14 0%, #0D1E20 50%, #0B1C2D 100%);
            color: rgba(255,255,255,0.9);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cb-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .cb-card {
            background: rgba(13,30,32,0.82);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 48px 44px;
            text-align: center;
            backdrop-filter: blur(16px);
            min-width: 280px;
            max-width: 360px;
            width: 100%;
        }

        .cb-logo {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 1.8em;
            letter-spacing: 3px;
            color: #fff;
            margin-bottom: 28px;
            text-decoration: none;
        }
        .cb-logo span { color: #5BB8E8; }

        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #5BB8E8;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .cb-msg {
            color: rgba(255,255,255,0.5);
            font-size: 0.9em;
            letter-spacing: 0.3px;
        }

        .cb-error {
            margin-top: 14px;
            padding: 12px 16px;
            border-radius: 10px;
            background: rgba(220,53,69,0.12);
            border: 1px solid rgba(220,53,69,0.30);
            color: #ff8090;
            font-size: 0.88em;
            line-height: 1.5;
            display: none;
        }
        .cb-error.visible { display: block; }
    </style>
</head>
<body>
    <div class="cb-wrap">
        <div class="cb-card">
            <a href="index.html" class="cb-logo">PNW<span>AV8R</span></a>
            <div class="spinner" id="cbSpinner"></div>
            <div class="cb-msg" id="cbMsg">Signing you in…</div>
            <div class="cb-error" id="cbError"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/club-config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script>
        let done = false;

        function showError(html) {
            document.getElementById('cbSpinner').style.display = 'none';
            document.getElementById('cbMsg').textContent = '';
            const el = document.getElementById('cbError');
            el.innerHTML = html;
            el.classList.add('visible');
        }

        async function checkAndRedirect(session) {
            if (done) return;
            done = true;

            // Check membership — look up by id first, fall back to email
            let { data: member } = await _supabase
                .from('members')
                .select('id, membership_active')
                .eq('id', session.user.id)
                .single();

            if (!member) {
                // Google auth may have created a new UUID — try matching by email
                const { data: byEmail } = await _supabase
                    .from('members')
                    .select('id, membership_active')
                    .eq('email', session.user.email)
                    .single();

                if (byEmail) {
                    await _supabase
                        .from('members')
                        .update({ id: session.user.id })
                        .eq('email', session.user.email);
                    member = byEmail;
                }
            }

            if (!member || !member.membership_active) {
                await _supabase.auth.signOut();
                showError('Access denied. Your account is pending approval.<br>Contact your club admin to request access.');
                return;
            }

            window.location.replace('/dashboard.html');
        }

        // Let the SDK handle PKCE code exchange + hash tokens
        _supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session) {
                checkAndRedirect(session);
            }
        });

        // Also check immediately in case session is already established
        _supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) checkAndRedirect(session);
        });

        // Timeout fallback after 15 seconds
        setTimeout(() => {
            if (!done) {
                done = true;
                showError('Sign-in timed out. <a href="login.html" style="color:#5BB8E8">Return to login</a>');
            }
        }, 15000);
    </script>
</body>
</html>
