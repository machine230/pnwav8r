<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — PNWAV8R</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        .login-card { background:white; border-radius:20px; padding:50px 44px; width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,0.15); text-align:center; }
        .login-logo { font-size:2.4em; font-weight:900; letter-spacing:3px; color:#2c3e50; margin-bottom:6px; }
        .login-sub  { color:#95a5a6; font-size:0.9em; margin-bottom:36px; }
        .login-input { width:100%; padding:14px 18px; border:2px solid #e9ecef; border-radius:10px; font-size:1em; margin-bottom:14px; box-sizing:border-box; transition:border-color 0.2s; }
        .login-input:focus { outline:none; border-color:#667eea; }
        .login-btn { width:100%; padding:14px; background:linear-gradient(135deg,#667eea,#764ba2); color:white; border:none; border-radius:10px; font-size:1em; font-weight:700; cursor:pointer; }
        .login-btn:disabled { opacity:0.5; cursor:not-allowed; }
        .err { margin-top:14px; padding:12px; border-radius:10px; background:#f8d7da; color:#721c24; font-size:0.9em; display:none; }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-card">
            <div class="login-logo">PNWAV8R</div>
            <div class="login-sub">Pacific Northwest Flying Club</div>
            <input type="email"    class="login-input" id="email" placeholder="Email" onkeydown="if(event.key==='Enter')signIn()">
            <input type="password" class="login-input" id="pass"  placeholder="Password" onkeydown="if(event.key==='Enter')signIn()">
            <button class="login-btn" id="btn" onclick="signIn()">Sign In</button>
            <div class="err" id="err"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script>
        async function signIn() {
            const email = document.getElementById('email').value.trim();
            const pass  = document.getElementById('pass').value;
            const err   = document.getElementById('err');
            const btn   = document.getElementById('btn');
            err.style.display = 'none';

            btn.disabled = true; btn.textContent = 'Signing in…';
            const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
            btn.disabled = false; btn.textContent = 'Sign In';

            if (error) {
                err.textContent = 'Invalid email or password.';
                err.style.display = 'block';
            } else {
                window.location.href = '/dashboard.html';
            }
        }
    </script>
</body>
</html>
