<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — PNWAV8R</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        .login-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 50px 44px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            text-align: center;
        }
        .login-logo {
            font-size: 2.4em;
            font-weight: 900;
            letter-spacing: 3px;
            color: #2c3e50;
            margin-bottom: 6px;
        }
        .login-sub {
            color: #95a5a6;
            font-size: 0.9em;
            margin-bottom: 36px;
        }
        .login-card h2 {
            font-size: 1.3em;
            color: #2c3e50;
            margin-bottom: 24px;
            font-weight: 600;
        }
        .login-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 1em;
            margin-bottom: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .login-input:focus {
            outline: none;
            border-color: #667eea;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .login-btn:hover { opacity: 0.9; }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .login-msg {
            margin-top: 20px;
            padding: 14px;
            border-radius: 10px;
            font-size: 0.9em;
            display: none;
        }
        .login-msg.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .login-msg.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .login-note {
            margin-top: 24px;
            font-size: 0.82em;
            color: #adb5bd;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-card">
            <div class="login-logo">PNWAV8R</div>
            <div class="login-sub">Pacific Northwest Flying Club</div>

            <div id="formView">
                <h2>Member Sign In</h2>
                <input type="email" class="login-input" id="emailInput"
                       placeholder="your@email.com"
                       onkeydown="if(event.key==='Enter') sendLink()">
                <button class="login-btn" id="sendBtn" onclick="sendLink()">
                    Send Magic Link
                </button>
                <div class="login-msg" id="loginMsg"></div>
                <p class="login-note">
                    We'll email you a one-click sign-in link.<br>
                    No password required.
                </p>
            </div>

            <div id="successView" style="display:none">
                <div style="font-size:3em;margin-bottom:16px">✉️</div>
                <h2>Check your email</h2>
                <p style="color:#7f8c8d;line-height:1.6">
                    We sent a sign-in link to<br>
                    <strong id="sentEmail"></strong>
                </p>
                <p style="color:#adb5bd;font-size:0.85em;margin-top:16px">
                    Click the link in the email to sign in.<br>
                    The link expires in 1 hour.
                </p>
                <button class="login-btn" style="margin-top:24px;background:#f8f9fa;color:#2c3e50;border:1px solid #dee2e6"
                        onclick="document.getElementById('successView').style.display='none'; document.getElementById('formView').style.display='block'">
                    Use a different email
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script>
        // If already logged in, go to dashboard
        _supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = '/dashboard.html';
        });

        async function sendLink() {
            const email = document.getElementById('emailInput').value.trim().toLowerCase();
            const msg   = document.getElementById('loginMsg');
            const btn   = document.getElementById('sendBtn');

            if (!email || !email.includes('@')) {
                msg.className = 'login-msg error';
                msg.textContent = 'Please enter a valid email address.';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Sending…';
            msg.className = 'login-msg';

            const { error } = await _supabase.auth.signInWithOtp({
                email,
                options: { emailRedirectTo: window.location.origin + '/dashboard.html' }
            });

            btn.disabled = false;
            btn.textContent = 'Send Magic Link';

            if (error) {
                msg.className = 'login-msg error';
                msg.textContent = error.message || 'Something went wrong. Try again.';
            } else {
                document.getElementById('sentEmail').textContent = email;
                document.getElementById('formView').style.display = 'none';
                document.getElementById('successView').style.display = 'block';
            }
        }
    </script>
</body>
</html>
