<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squawk Board — PNWAV8R</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/theme.css">
    <script src="js/theme.js?v=3"></script>
    <style>body{visibility:hidden}</style>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Open Sans', sans-serif;
            background: var(--body-bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── NAV ── */
        .club-nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(12,31,20,0.97);
            box-shadow: 0 2px 16px rgba(0,0,0,0.5);
        }
        .club-nav-inner {
            max-width: 1100px; margin: 0 auto;
            padding: 0 28px; height: 64px;
            display: flex; align-items: center;
            justify-content: space-between; gap: 16px;
        }
        .club-nav-logo {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900; font-size: 1.25em;
            color: #fff; text-decoration: none; letter-spacing: 1px;
        }
        .club-nav-logo span { color: #5BB8E8; }
        .club-nav-links { display: flex; gap: 4px; align-items: center; }
        .club-nav-links a {
            text-decoration: none; color: rgba(255,255,255,0.7);
            font-family: 'Montserrat', sans-serif; font-weight: 700;
            font-size: 0.84em; padding: 7px 13px; border-radius: 6px;
            transition: color 0.2s, background 0.2s;
        }
        .club-nav-links a:hover, .club-nav-links a.active {
            color: #fff; background: rgba(255,255,255,0.09);
        }
        #navUser { font-size: 0.82em; color: rgba(255,255,255,0.45); font-family: 'Montserrat', sans-serif; }
        .hamburger-btn { display: none; background: none; border: none; cursor: pointer; padding: 8px; }
        .hamburger-btn span { display: block; width: 22px; height: 2px; background: #fff; border-radius: 2px; margin: 5px 0; }

        /* ── PAGE ── */
        .page-wrap { max-width: 900px; margin: 0 auto; padding: 32px 24px 64px; }

        /* ── PLANE STATUS BAR ── */
        .plane-status-bar {
            border-radius: 12px; padding: 14px 22px; margin-bottom: 28px;
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
        }
        .plane-status-bar.available   { background: rgba(42,122,82,0.15);  border: 1px solid rgba(42,122,82,0.4); }
        .plane-status-bar.squawk      { background: rgba(220,53,69,0.12);  border: 1px solid rgba(220,53,69,0.35); }
        .plane-status-bar.maintenance { background: rgba(212,131,26,0.12); border: 1px solid rgba(212,131,26,0.35); }
        .plane-status-bar.flying      { background: rgba(91,184,232,0.12); border: 1px solid rgba(91,184,232,0.3); }
        .status-left { display: flex; align-items: center; gap: 12px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
        .available .status-dot   { background: #5DD89A; }
        .squawk .status-dot      { background: #ff8090; }
        .maintenance .status-dot { background: #F5B942; }
        .flying .status-dot      { background: #5BB8E8; }
        .status-tail { font-family: 'Montserrat', sans-serif; font-size: 1.1em; font-weight: 900; color: #fff; letter-spacing: 2px; }
        .status-label { font-weight: 700; font-size: 0.88em; margin-top: 2px; }
        .available .status-label   { color: #5DD89A; }
        .squawk .status-label      { color: #ff8090; }
        .maintenance .status-label { color: #F5B942; }
        .flying .status-label      { color: #5BB8E8; }
        .status-note { font-size: 0.8em; color: rgba(255,255,255,0.45); }

        /* ── FILTER TABS ── */
        .filter-tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-tab {
            padding: 7px 18px; border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.05);
            font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.82em;
            cursor: pointer; color: rgba(255,255,255,0.6);
            transition: all 0.2s;
        }
        .filter-tab:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .filter-tab.active { background: #2A7A52; color: #fff; border-color: transparent; }

        /* ── SQUAWK CARDS ── */
        .squawk-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.09);
            border-left: 4px solid rgba(255,255,255,0.15);
            border-radius: 12px; padding: 22px 26px;
            margin-bottom: 14px;
        }
        .squawk-card.open.no_go   { border-left-color: #ff8090; }
        .squawk-card.open.caution { border-left-color: #F5B942; }
        .squawk-card.open.go      { border-left-color: #5DD89A; }
        .squawk-card.open         { border-left-color: #ff8090; }
        .squawk-card.in_progress  { border-left-color: #F5B942; }
        .squawk-card.deferred     { border-left-color: rgba(255,255,255,0.25); }
        .squawk-card.resolved     { border-left-color: #5DD89A; opacity: 0.75; }

        .sq-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
        .sq-badges { display: flex; gap: 6px; flex-wrap: wrap; }
        .sq-badge { font-size: 0.7em; font-weight: 700; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
        .sq-badge.open        { background: rgba(220,53,69,0.2);   color: #ff8090;  border: 1px solid rgba(220,53,69,0.35); }
        .sq-badge.in_progress { background: rgba(245,185,66,0.15); color: #F5B942;  border: 1px solid rgba(245,185,66,0.3); }
        .sq-badge.deferred    { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.15); }
        .sq-badge.resolved    { background: rgba(42,122,82,0.2);   color: #5DD89A;  border: 1px solid rgba(42,122,82,0.35); }
        .sq-badge.no_go       { background: rgba(220,53,69,0.25);  color: #ff8090;  border: 1px solid rgba(220,53,69,0.4); }
        .sq-badge.caution     { background: rgba(245,185,66,0.15); color: #F5B942;  border: 1px solid rgba(245,185,66,0.3); }
        .sq-badge.go          { background: rgba(42,122,82,0.2);   color: #5DD89A;  border: 1px solid rgba(42,122,82,0.35); }

        .sq-description { font-size: 0.95em; color: rgba(255,255,255,0.9); font-weight: 600; margin-bottom: 6px; line-height: 1.5; }
        .sq-meta { font-size: 0.78em; color: rgba(255,255,255,0.4); }

        /* Maintenance notes */
        .sq-maint-notes {
            margin-top: 12px; padding: 12px 16px; border-radius: 8px;
            background: rgba(245,185,66,0.06); border-left: 3px solid rgba(245,185,66,0.5);
        }
        .sq-maint-label { font-size: 0.7em; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #F5B942; margin-bottom: 4px; }
        .sq-maint-text  { font-size: 0.9em; color: rgba(255,255,255,0.8); line-height: 1.5; }

        /* Admin response */
        .sq-response {
            margin-top: 12px; padding: 12px 16px; border-radius: 8px;
            background: rgba(91,184,232,0.06); border-left: 3px solid rgba(91,184,232,0.4);
        }
        .sq-response-label { font-size: 0.7em; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #5BB8E8; margin-bottom: 4px; }
        .sq-response-text  { font-size: 0.9em; color: rgba(255,255,255,0.8); line-height: 1.5; }
        .sq-response-meta  { font-size: 0.76em; color: rgba(255,255,255,0.35); margin-top: 4px; }

        /* Admin respond form */
        .sq-admin-toggle { font-size: 0.8em; color: #5BB8E8; cursor: pointer; font-weight: 700; margin-top: 10px; display: inline-block; }
        .sq-respond-form { margin-top: 14px; display: none; }
        .sq-status-label { font-size: 0.72em; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.4); margin-right: 8px; }
        .sq-status-select {
            padding: 7px 12px; border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px; font-size: 0.85em; font-family: inherit;
            color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.07); cursor: pointer;
        }
        .sq-status-select:focus { outline: none; border-color: #5BB8E8; }
        .sq-respond-form textarea {
            width: 100%; padding: 10px 14px;
            border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
            font-size: 0.9em; box-sizing: border-box; resize: vertical; min-height: 70px;
            font-family: inherit; margin-bottom: 8px;
            background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9);
        }
        .sq-respond-form textarea:focus { outline: none; border-color: #5BB8E8; }
        .sq-respond-actions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .sq-btn { padding: 8px 16px; border-radius: 6px; font-size: 0.82em; font-weight: 700; cursor: pointer; border: none; font-family: 'Montserrat', sans-serif; }
        .sq-btn-primary { background: #2A7A52; color: #fff; }
        .sq-btn-primary:hover { background: #359966; }
        .sq-btn-danger  { background: rgba(220,53,69,0.2); color: #ff8090; border: 1px solid rgba(220,53,69,0.3); }
        .sq-btn-success { background: rgba(42,122,82,0.2); color: #5DD89A; border: 1px solid rgba(42,122,82,0.35); }
        .sq-btn-outline { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.12); }
        .sq-msg { font-size: 0.82em; margin-top: 6px; }

        .empty-state { color: rgba(255,255,255,0.3); font-size: 0.95em; text-align: center; padding: 48px 0; }

        /* ── GROUNDING DATE PICKER ── */
        .ground-picker {
            display: none; margin-top: 12px; padding: 16px;
            background: rgba(220,53,69,0.08); border: 1px solid rgba(220,53,69,0.25);
            border-radius: 10px;
        }
        .ground-picker.open { display: block; }
        .ground-picker-title { font-size: 0.78em; font-weight: 700; color: #ff8090; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; font-family: 'Montserrat', sans-serif; }
        .ground-picker-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
        .ground-picker-field { flex: 1; min-width: 200px; }
        .ground-picker-label { font-size: 0.72em; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; display: block; font-family: 'Montserrat', sans-serif; }
        .ground-picker-input {
            width: 100%; padding: 9px 12px;
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 7px; color: rgba(255,255,255,0.9); font-size: 0.88em;
            font-family: inherit;
        }
        .ground-picker-input:focus { outline: none; border-color: #ff8090; }
        .ground-picker-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .ground-picker-msg { font-size: 0.8em; margin-top: 8px; }

        /* ── MOBILE ── */
        @media(max-width: 680px) {
            .hamburger-btn { display: block; }
            .club-nav-inner { position: relative; }
            .club-nav-links {
                display: none; position: absolute; top: 64px; left: 0; right: 0;
                flex-direction: column; background: rgba(12,31,20,0.99);
                padding: 12px 24px 24px;
                border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 999;
            }
            .club-nav-links.nav-open { display: flex; }
            .club-nav-links a { padding: 12px 8px; border-bottom: 1px solid rgba(255,255,255,0.08); border-radius: 0; font-size: 1em; width: 100%; }
            .page-wrap { padding: 16px; }
            .squawk-card { padding: 18px; }
            .sq-respond-actions { flex-direction: column; gap: 8px; }
            .sq-btn { width: 100%; text-align: center; padding: 12px; min-height: 44px; }
            .filter-tabs { gap: 6px; }
            .filter-tab { padding: 9px 14px; }
        }
    </style>
</head>
<body>
    <nav class="club-nav">
        <div class="club-nav-inner">
            <a href="dashboard.html" class="club-nav-logo">PNW<span>AV8R</span></a>
            <div id="navLinks" class="club-nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="schedule.html">Schedule</a>
                <a href="squawks.html" class="active">Squawks</a>
                <a href="post-flight.html">Post-Flight</a>
                <a href="directory.html">Directory</a>
                <span id="adminLink" style="display:none"><a href="admin.html">Admin</a></span>
            </div>
            <div id="navUser"></div>
            <button class="hamburger-btn" onclick="toggleNav()" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <div class="page-wrap">
        <div id="planeStatusBar" class="plane-status-bar available">
            <div class="status-left">
                <div class="status-dot"></div>
                <div>
                    <div class="status-tail">N7798E</div>
                    <div class="status-label" id="planeStatusLabel">Loading…</div>
                </div>
            </div>
            <div class="status-note" id="planeStatusNote"></div>
        </div>

        <!-- Grounding date picker — only visible to admin/A&P -->
        <div id="groundPickerWrap" style="display:none; margin-bottom:20px;">
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;">
                <button class="sq-btn sq-btn-danger" onclick="toggleGroundPicker()">Ground Plane</button>
                <button class="sq-btn sq-btn-success" onclick="ungroundPlane()">Clear to Fly</button>
            </div>
            <div class="ground-picker" id="groundPicker">
                <div class="ground-picker-title">Set Maintenance Window</div>
                <div class="ground-picker-row">
                    <div class="ground-picker-field">
                        <label class="ground-picker-label">Grounded From</label>
                        <input type="datetime-local" id="groundedFrom" class="ground-picker-input">
                    </div>
                    <div class="ground-picker-field">
                        <label class="ground-picker-label">Expected Return (optional)</label>
                        <input type="datetime-local" id="groundedUntil" class="ground-picker-input">
                    </div>
                </div>
                <div class="ground-picker-actions">
                    <button class="sq-btn sq-btn-danger" onclick="groundPlane()">Confirm Ground</button>
                    <button class="sq-btn sq-btn-outline" onclick="toggleGroundPicker()">Cancel</button>
                </div>
                <div class="ground-picker-msg" id="groundPickerMsg"></div>
            </div>
        </div>

        <div class="filter-tabs">
            <button class="filter-tab active" onclick="setFilter('open',this)">Open</button>
            <button class="filter-tab" onclick="setFilter('in_progress',this)">In Progress</button>
            <button class="filter-tab" onclick="setFilter('deferred',this)">Deferred</button>
            <button class="filter-tab" onclick="setFilter('all',this)">All</button>
            <button class="filter-tab" onclick="setFilter('resolved',this)">Resolved</button>
        </div>

        <div id="squawkList"><div class="empty-state">Loading…</div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/club-config.js?v=3"></script>
    <script src="js/supabase-client.js?v=3"></script>
    <script src="js/utils.js?v=3"></script>
    <script src="js/auth.js?v=3"></script>
    <script>
        let currentMember = null;
        let allSquawks    = [];
        let currentFilter = 'open';
        let airplaneId    = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const session = await requireAuth();
            if (!session) return;
            currentMember = await getCurrentMember();
            renderNavUser(currentMember);
            if (isAdmin(currentMember)) document.getElementById('adminLink').style.display = 'inline';

            const { data: plane } = await _supabase.from('airplanes').select('id,status,grounded_from,grounded_until').eq('tail_number', AIRPLANE_TAIL).single();
            airplaneId = plane?.id;
            renderPlaneStatus(plane?.status);

            // Show ground controls for admin/A&P
            if (isAdminOrAP(currentMember)) {
                document.getElementById('groundPickerWrap').style.display = 'block';
                // Pre-fill existing window if set
                if (plane?.grounded_from) {
                    document.getElementById('groundedFrom').value = plane.grounded_from.slice(0,16);
                }
                if (plane?.grounded_until) {
                    document.getElementById('groundedUntil').value = plane.grounded_until.slice(0,16);
                }
            }

            await loadSquawks();

            const debounce = (fn, ms) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; };

            _supabase.channel('squawks-live')
                .on('postgres_changes', { event:'*', schema:'public', table:'squawks' }, debounce(loadSquawks, 500))
                .subscribe();

            _supabase.channel('plane-live')
                .on('postgres_changes', { event:'*', schema:'public', table:'airplanes' }, debounce(async () => {
                    const { data: p } = await _supabase.from('airplanes').select('status').eq('tail_number', AIRPLANE_TAIL).single();
                    renderPlaneStatus(p?.status);
                }, 500))
                .subscribe();
        });

        function renderPlaneStatus(status) {
            const bar   = document.getElementById('planeStatusBar');
            const label = document.getElementById('planeStatusLabel');
            const note  = document.getElementById('planeStatusNote');
            const map   = {
                available:   { cls:'available',   text:'Available — Cleared to fly',     note:'' },
                flying:      { cls:'flying',       text:'In the Air',                     note:'' },
                maintenance: { cls:'maintenance',  text:'In Maintenance — Not available', note:'Contact admin for details' },
                squawk:      { cls:'squawk',       text:'GROUNDED — Open squawk',         note:'Do not fly until admin clears' }
            };
            const s = map[status] || map.available;
            bar.className     = `plane-status-bar ${s.cls}`;
            label.textContent = s.text;
            note.textContent  = s.note;
        }

        async function loadSquawks() {
            const { data } = await _supabase
                .from('squawks')
                .select('*, reporter:members!squawks_reported_by_fkey(name), responder:members!squawks_resolved_by_fkey(name), updater:members!squawks_status_updated_by_fkey(name)')
                .eq('airplane_id', airplaneId)
                .order('reported_at', { ascending: false });

            allSquawks = data || [];
            renderSquawks();
        }

        const STATUS_MAP = {
            open:        { label:'Open',        cls:'open',        card:'open' },
            in_progress: { label:'In Progress', cls:'in_progress', card:'in_progress' },
            deferred:    { label:'Deferred',    cls:'deferred',    card:'deferred' },
            resolved:    { label:'Resolved',    cls:'resolved',    card:'resolved' }
        };

        function setFilter(f, btn) {
            currentFilter = f;
            document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderSquawks();
        }

        function renderSquawks() {
            const el = document.getElementById('squawkList');
            let list = allSquawks;
            if (currentFilter === 'open')        list = allSquawks.filter(s => s.status === 'open');
            else if (currentFilter === 'in_progress') list = allSquawks.filter(s => s.status === 'in_progress');
            else if (currentFilter === 'deferred')    list = allSquawks.filter(s => s.status === 'deferred');
            else if (currentFilter === 'resolved')    list = allSquawks.filter(s => s.status === 'resolved');

            if (!list.length) {
                const msgs = { open:'No open squawks — airplane is good to go.', in_progress:'No squawks in progress.', deferred:'No deferred squawks.', resolved:'No resolved squawks.', all:'No squawks on record.' };
                el.innerHTML = `<div class="empty-state">${msgs[currentFilter] || 'No squawks found.'}</div>`;
                return;
            }

            const canManage = isAdminOrAP(currentMember);

            el.innerHTML = list.map(s => {
                const st     = STATUS_MAP[s.status] || STATUS_MAP.open;
                const safeId = escapeHtml(s.id);
                const isActive = ['open','in_progress','deferred'].includes(s.status);

                const statusOptions = Object.entries(STATUS_MAP).map(([val, m]) =>
                    `<option value="${val}" ${s.status === val ? 'selected' : ''}>${m.label}</option>`
                ).join('');

                return `<div class="squawk-card ${st.card}">
                    <div class="sq-header">
                        <div class="sq-badges">
                            <span class="sq-badge ${st.cls}">${st.label}</span>
                        </div>
                        <div class="sq-meta">${fmtDate(s.reported_at)}</div>
                    </div>
                    <div class="sq-description">${escapeHtml(s.description)}</div>
                    <div class="sq-meta">Reported by ${escapeHtml(s.reporter?.name) || '—'}</div>

                    ${s.maintenance_notes ? `
                        <div class="sq-maint-notes">
                            <div class="sq-maint-label">Maintenance Notes</div>
                            <div class="sq-maint-text">${escapeHtml(s.maintenance_notes)}</div>
                            ${s.status_updated_at ? `<div class="sq-meta" style="margin-top:4px">Updated by ${escapeHtml(s.updater?.name) || 'A&P'} · ${fmtDate(s.status_updated_at)}</div>` : ''}
                        </div>` : ''}

                    ${s.admin_response ? `
                        <div class="sq-response">
                            <div class="sq-response-label">Response</div>
                            <div class="sq-response-text">${escapeHtml(s.admin_response)}</div>
                            <div class="sq-response-meta">${escapeHtml(s.responder?.name) || '—'} · ${s.admin_response_at ? fmtDate(s.admin_response_at) : ''}</div>
                        </div>` : ''}

                    ${canManage && isActive ? `
                        <span class="sq-admin-toggle" onclick="toggleRespond('${safeId}')">+ Update / Respond</span>
                        <div class="sq-respond-form" id="form_${safeId}">
                            <div style="margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                                <span class="sq-status-label">Set Status</span>
                                <select class="sq-status-select" id="status_${safeId}">${statusOptions}</select>
                            </div>
                            <textarea id="resp_${safeId}" placeholder="Response or action taken…" maxlength="2000">${escapeHtml(s.admin_response) || ''}</textarea>
                            <textarea id="maint_${safeId}" placeholder="Maintenance notes (A&P work log, parts, procedures…)" maxlength="5000">${escapeHtml(s.maintenance_notes) || ''}</textarea>
                            <div class="sq-respond-actions">
                                <button class="sq-btn sq-btn-primary" onclick="saveUpdate('${safeId}')">Save Update</button>
                            </div>
                            <div class="sq-msg" id="msg_${safeId}"></div>
                        </div>` : ''}
                </div>`;
            }).join('');
        }

        function toggleRespond(id) {
            const form = document.getElementById(`form_${id}`);
            form.style.display = form.style.display === 'block' ? 'none' : 'block';
        }

        async function saveUpdate(id) {
            const newStatus  = document.getElementById(`status_${id}`).value;
            const response   = document.getElementById(`resp_${id}`).value.trim();
            const maintNotes = document.getElementById(`maint_${id}`).value.trim();
            const msgEl      = document.getElementById(`msg_${id}`);

            if (maintNotes.length > 2000) {
                msgEl.style.color = '#ff8090';
                msgEl.textContent = 'Maintenance notes must be 2000 characters or less.';
                return;
            }

            const update = {
                status:             newStatus,
                status_updated_at:  new Date().toISOString(),
                status_updated_by:  currentMember.id,
                admin_response:     response || null,
                admin_response_at:  response ? new Date().toISOString() : null,
                admin_response_by:  currentMember.id,
                maintenance_notes:  maintNotes || null
            };

            if (newStatus === 'resolved') {
                update.resolved_at = new Date().toISOString();
                update.resolved_by = currentMember.id;
            }

            const { error } = await _supabase.from('squawks').update(update).eq('id', id);
            if (error) {
                console.error('[saveUpdate]', error?.message || error);
                msgEl.style.color = '#ff8090';
                msgEl.textContent = 'Save failed. Please try again.';
                return;
            }

            if (newStatus === 'resolved') {
                const { count } = await _supabase.from('squawks')
                    .select('*', { count:'exact', head:true })
                    .eq('airplane_id', airplaneId)
                    .in('status', ['open','in_progress']);
                if (count === 0) await ungroundPlane();
            }

            await loadSquawks();
        }

        function toggleGroundPicker() {
            document.getElementById('groundPicker').classList.toggle('open');
            document.getElementById('groundPickerMsg').textContent = '';
        }

        async function groundPlane() {
            const fromVal  = document.getElementById('groundedFrom').value;
            const untilVal = document.getElementById('groundedUntil').value;
            const msg      = document.getElementById('groundPickerMsg');
            if (!fromVal) { msg.style.color = '#ff8090'; msg.textContent = 'Please set a "Grounded From" date.'; return; }
            const update = {
                status:        'squawk',
                grounded_from:  new Date(fromVal).toISOString(),
                grounded_until: untilVal ? new Date(untilVal).toISOString() : null,
                updated_at:     new Date().toISOString()
            };
            const { error } = await _supabase.from('airplanes').update(update).eq('id', airplaneId);
            if (error) { msg.style.color = '#ff8090'; msg.textContent = 'Save failed. Try again.'; return; }
            msg.style.color = '#5DD89A'; msg.textContent = 'Plane grounded. Calendar blocked.';
            renderPlaneStatus('squawk');
            setTimeout(() => document.getElementById('groundPicker').classList.remove('open'), 1500);
        }

        async function ungroundPlane() {
            const { error } = await _supabase.from('airplanes').update({
                status:        'available',
                grounded_from:  null,
                grounded_until: null,
                updated_at:     new Date().toISOString()
            }).eq('id', airplaneId);
            if (error) { alert('Clear failed. Try again.'); return; }
            document.getElementById('groundedFrom').value  = '';
            document.getElementById('groundedUntil').value = '';
            document.getElementById('groundPicker').classList.remove('open');
            renderPlaneStatus('available');

            // Notify any waitlisted members that the plane is back in service
            if (airplaneId) {
                _supabase.auth.getSession().then(({ data: { session } }) => {
                    fetch('/.netlify/functions/notifyWaitlist', {
                        method:  'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session?.access_token || ''}` },
                        body:    JSON.stringify({ airplane_id: airplaneId })
                    }).catch(err => console.error('[ungroundPlane] Waitlist notify failed:', err?.message || err));
                });
            }
        }

        function fmtDate(iso) { return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',hour12:true}); }
        function toggleNav()  { document.getElementById('navLinks').classList.toggle('nav-open'); }
    </script>
</body>
</html>
