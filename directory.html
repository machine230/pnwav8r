<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Directory — PNWAV8R</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/theme.css">
    <script src="js/theme.js?v=3"></script>
    <style>body{visibility:hidden}</style>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Open Sans', sans-serif;
            background: var(--body-bg);
            background-image:
                linear-gradient(rgba(91,184,232,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(91,184,232,0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            color: var(--text);
            margin: 0;
            min-height: 100vh;
        }

        /* ── NAV ── */
        .club-nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(12,31,20,0.97);
            box-shadow: 0 2px 16px rgba(0,0,0,0.5);
        }
        .club-nav-inner {
            max-width: 1100px; margin: 0 auto;
            padding: 0 28px; height: 64px;
            display: flex; align-items: center;
            justify-content: space-between; gap: 16px;
        }
        .club-nav-logo {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900; font-size: 1.25em;
            color: #fff; text-decoration: none; letter-spacing: 1px;
        }
        .club-nav-logo span { color: #5BB8E8; }
        .club-nav-links { display: flex; gap: 4px; align-items: center; }
        .club-nav-links a {
            text-decoration: none; color: rgba(255,255,255,0.75);
            font-family: 'Montserrat', sans-serif; font-weight: 700;
            font-size: 0.84em; padding: 7px 13px; border-radius: 6px;
            transition: color 0.2s, background 0.2s;
        }
        .club-nav-links a:hover, .club-nav-links a.active {
            color: #fff; background: rgba(255,255,255,0.09);
        }
        #navUser { font-size: 0.82em; color: rgba(255,255,255,0.5); font-family: 'Montserrat', sans-serif; }
        .hamburger-btn { display:none; background:none; border:none; cursor:pointer; padding:8px; }
        .hamburger-btn span { display:block; width:22px; height:2px; background:#fff; border-radius:2px; margin:5px 0; }

        /* ── PAGE ── */
        .page-wrap { max-width: 1100px; margin: 0 auto; padding: 36px 24px 64px; }

        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 12px; margin-bottom: 28px;
        }
        .page-header h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900; font-size: 1.55em; margin: 0;
        }
        .page-header h1 span { color: #5BB8E8; }
        .member-count {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.72em; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            color: rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 6px 14px; border-radius: 20px;
        }

        /* ── SEARCH ── */
        .search-wrap {
            margin-bottom: 20px;
            display: flex; gap: 10px; align-items: center;
        }
        .search-input {
            flex: 1; max-width: 340px;
            padding: 10px 16px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit; font-size: 0.9em;
            transition: border-color 0.2s;
        }
        .search-input::placeholder { color: rgba(255,255,255,0.3); }
        .search-input:focus { outline: none; border-color: #5BB8E8; box-shadow: 0 0 0 3px rgba(91,184,232,0.1); }

        /* ── DIRECTORY TABLE ── */
        .dir-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 16px;
            overflow: hidden;
        }
        .dir-table {
            width: 100%; border-collapse: collapse;
        }
        .dir-table thead th {
            padding: 14px 20px;
            text-align: left;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.68em; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px;
            color: rgba(255,255,255,0.35);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.15);
        }
        .dir-table tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.06);
            transition: background 0.15s;
        }
        .dir-table tbody tr:last-child { border-bottom: none; }
        .dir-table tbody tr:hover { background: rgba(255,255,255,0.04); }
        .dir-table tbody tr.me { background: rgba(91,184,232,0.07); }
        .dir-table tbody tr.me:hover { background: rgba(91,184,232,0.11); }
        .dir-table tbody td {
            padding: 16px 20px;
            font-size: 0.88em;
            color: rgba(255,255,255,0.8);
            vertical-align: middle;
        }

        /* Avatar + name cell */
        .member-name-cell { display: flex; align-items: center; gap: 12px; }
        .member-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700; font-size: 0.85em;
            flex-shrink: 0;
        }
        .avatar-admin  { background: linear-gradient(135deg,#667eea,#764ba2); color:#fff; }
        .avatar-ap     { background: linear-gradient(135deg,#e67e22,#d35400); color:#fff; }
        .avatar-member { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); }

        .member-name { font-weight: 600; color: #fff; font-size: 0.97em; }
        .me-tag {
            font-size: 0.7em; font-weight: 700; letter-spacing: 1px;
            background: rgba(91,184,232,0.18); color: #5BB8E8;
            padding: 2px 7px; border-radius: 4px;
            text-transform: uppercase;
        }

        /* Role badge */
        .role-badge {
            display: inline-block;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.68em; font-weight: 700;
            padding: 3px 9px; border-radius: 10px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .badge-admin  { background: linear-gradient(135deg,#667eea,#764ba2); color:#fff; }
        .badge-ap     { background: linear-gradient(135deg,#e67e22,#d35400); color:#fff; }
        .badge-member { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.65); }

        .dim { color: rgba(255,255,255,0.35); }
        .redacted { color: rgba(255,255,255,0.2); font-style: italic; font-size: 0.9em; }

        /* ── EMPTY / LOADING ── */
        .dir-state {
            padding: 56px 24px;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 0.95em;
        }
        .dir-state .spinner {
            width: 28px; height: 28px;
            border: 3px solid rgba(255,255,255,0.08);
            border-top-color: #5BB8E8;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 14px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── PRIVACY NOTICE ── */
        .privacy-note {
            margin-top: 18px;
            padding: 12px 18px;
            border-radius: 10px;
            background: rgba(91,184,232,0.06);
            border: 1px solid rgba(91,184,232,0.15);
            font-size: 0.8em;
            color: rgba(255,255,255,0.4);
            display: flex; align-items: center; gap: 8px;
        }

        /* ── MOBILE ── */
        @media (max-width: 720px) {
            .club-nav-links { display: none; flex-direction: column; position: absolute; top: 64px; left: 0; right: 0; background: rgba(12,31,20,0.98); padding: 12px 0; z-index: 999; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
            .club-nav-links.nav-open { display: flex; }
            .club-nav-links a { padding: 12px 28px; border-radius: 0; }
            .hamburger-btn { display: block; }
            .club-nav { position: relative; }
            .dir-table thead th:nth-child(3),
            .dir-table tbody td:nth-child(3),
            .dir-table thead th:nth-child(4),
            .dir-table tbody td:nth-child(4) { display: none; }
        }
    </style>
</head>
<body>
    <nav class="club-nav">
        <div class="club-nav-inner">
            <a href="dashboard.html" class="club-nav-logo">PNW<span>AV8R</span></a>
            <div id="navLinks" class="club-nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="schedule.html">Schedule</a>
                <a href="squawks.html">Squawks</a>
                <a href="post-flight.html">Post-Flight</a>
                <a href="directory.html" class="active">Directory</a>
                <span id="adminLink" style="display:none"><a href="admin.html">Admin</a></span>
            </div>
            <div id="navUser"></div>
            <button class="hamburger-btn" onclick="toggleNav()" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <div class="page-wrap">
        <div class="page-header">
            <h1>Member <span>Directory</span></h1>
            <span class="member-count" id="memberCount">Loading…</span>
        </div>

        <div class="search-wrap">
            <input type="text" class="search-input" id="searchInput"
                   placeholder="Search by name…" oninput="filterMembers()">
        </div>

        <div class="dir-card">
            <table class="dir-table" id="dirTable">
                <thead>
                    <tr>
                        <th>Member</th>
                        <th>Role</th>
                        <th id="emailHeader">Email</th>
                        <th id="phoneHeader">Phone</th>
                        <th>Joined</th>
                    </tr>
                </thead>
                <tbody id="dirBody">
                    <tr><td colspan="5"><div class="dir-state"><div class="spinner"></div>Loading members…</div></td></tr>
                </tbody>
            </table>
        </div>

        <div class="privacy-note" id="privacyNote" style="display:none">
            🔒 Contact details are visible to admins only. Your own details are always visible to you.
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/club-config.js?v=3"></script>
    <script src="js/supabase-client.js?v=3"></script>
    <script src="js/utils.js?v=3"></script>
    <script src="js/auth.js?v=3"></script>
    <script>
        let currentMember = null;
        let allMembers    = [];

        // Failsafe: never leave page blank more than 8 seconds
        setTimeout(() => { document.body.style.visibility = 'visible'; }, 8000);

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const session = await requireAuth();
                if (!session) return;

                currentMember = await getCurrentMember();
                renderNavUser(currentMember);
                if (isAdmin(currentMember)) document.getElementById('adminLink').style.display = 'inline';

                // Show privacy note for non-admins
                if (!isAdmin(currentMember)) {
                    document.getElementById('privacyNote').style.display = 'flex';
                }

                await loadMembers();
            } catch (err) {
                console.error('[directory] init error:', err);
                document.body.style.visibility = 'visible';
            }
        });

        async function loadMembers() {
            const { data, error } = await _supabase
                .from('members')
                .select('id, name, email, phone, role, joined_at, membership_active')
                .eq('membership_active', true)
                .order('joined_at', { ascending: true });

            if (error) {
                document.getElementById('dirBody').innerHTML =
                    `<tr><td colspan="5"><div class="dir-state">Failed to load members. Please try again.</div></td></tr>`;
                return;
            }

            allMembers = data || [];
            document.getElementById('memberCount').textContent =
                allMembers.length + ' active member' + (allMembers.length !== 1 ? 's' : '');

            renderRows(allMembers);
        }

        function renderRows(members) {
            const canSeeContact = isAdmin(currentMember);
            const tbody = document.getElementById('dirBody');

            if (!members.length) {
                tbody.innerHTML = `<tr><td colspan="5"><div class="dir-state">No members found.</div></td></tr>`;
                return;
            }

            tbody.innerHTML = members.map(m => {
                const isMe     = m.id === currentMember?.id;
                const initial  = (m.name || m.email || '?')[0].toUpperCase();
                const avatarCs = m.role === 'admin' ? 'avatar-admin' : m.role === 'ap' ? 'avatar-ap' : 'avatar-member';
                const badgeCs  = m.role === 'admin' ? 'badge-admin'  : m.role === 'ap' ? 'badge-ap'  : 'badge-member';
                const roleLabel = { admin: 'Admin', ap: 'A&amp;P', member: 'Member' }[m.role] || 'Member';

                const showContact = canSeeContact || isMe;
                const emailCell = showContact
                    ? `<a href="mailto:${escapeHtml(m.email)}" style="color:#5BB8E8;text-decoration:none">${escapeHtml(m.email)}</a>`
                    : `<span class="redacted">members only</span>`;
                const phoneCell = showContact
                    ? (m.phone ? `<a href="tel:${escapeHtml(m.phone)}" style="color:rgba(255,255,255,0.7);text-decoration:none">${escapeHtml(m.phone)}</a>` : `<span class="dim">—</span>`)
                    : `<span class="redacted">members only</span>`;

                const joined = m.joined_at
                    ? new Date(m.joined_at).toLocaleDateString('en-US', { month: 'short', year: 'numeric' })
                    : '—';

                return `<tr class="${isMe ? 'me' : ''}">
                    <td>
                        <div class="member-name-cell">
                            <div class="member-avatar ${avatarCs}">${escapeHtml(initial)}</div>
                            <div>
                                <div class="member-name">${escapeHtml(m.name || m.email)}</div>
                                ${isMe ? '<span class="me-tag">You</span>' : ''}
                            </div>
                        </div>
                    </td>
                    <td><span class="role-badge ${badgeCs}">${roleLabel}</span></td>
                    <td>${emailCell}</td>
                    <td>${phoneCell}</td>
                    <td><span class="dim">${escapeHtml(joined)}</span></td>
                </tr>`;
            }).join('');
        }

        function filterMembers() {
            const q = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!q) { renderRows(allMembers); return; }
            renderRows(allMembers.filter(m =>
                (m.name  || '').toLowerCase().includes(q) ||
                (m.email || '').toLowerCase().includes(q)
            ));
        }

        function toggleNav() {
            document.getElementById('navLinks').classList.toggle('nav-open');
        }
    </script>
</body>
</html>
