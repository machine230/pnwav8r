[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# ── Security headers ─────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://unpkg.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com https://unpkg.com 'unsafe-inline'; font-src https://fonts.gstatic.com https://unpkg.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://wms.chartbundle.com; connect-src 'self' https://afwlrszavjyvskpousmy.supabase.co wss://afwlrszavjyvskpousmy.supabase.co https://aviationweather.gov; frame-ancestors 'none';"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Clean URL aliases ─────────────────────────────────────────
[[redirects]]
  from   = "/dashboard"
  to     = "/dashboard.html"
  status = 200

[[redirects]]
  from   = "/schedule"
  to     = "/schedule.html"
  status = 200

[[redirects]]
  from   = "/squawks"
  to     = "/squawks.html"
  status = 200

[[redirects]]
  from   = "/post-flight"
  to     = "/post-flight.html"
  status = 200

[[redirects]]
  from   = "/directory"
  to     = "/directory.html"
  status = 200

[[redirects]]
  from   = "/admin"
  to     = "/admin.html"
  status = 200

[[redirects]]
  from   = "/weather"
  to     = "/weather.html"
  status = 200

[[redirects]]
  from   = "/wb"
  to     = "/wb.html"
  status = 200
