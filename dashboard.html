<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — PNWAV8R</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        .club-nav {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(10px);
            padding: 0.9rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
        }
        .club-nav-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }
        .club-nav-logo { font-size: 1.6em; font-weight: 900; letter-spacing: 2px; color: #2c3e50; text-decoration: none; }
        .club-nav-links { display: flex; gap: 6px; }
        .club-nav-links a {
            text-decoration: none;
            color: #2c3e50;
            font-weight: 500;
            padding: 7px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .club-nav-links a:hover, .club-nav-links a.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .page-wrap { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

        /* Airplane status card */
        .airplane-card {
            border-radius: 18px;
            padding: 28px 32px;
            margin-bottom: 28px;
            color: white;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 20px;
            align-items: start;
        }
        .airplane-card.available  { background: linear-gradient(135deg, #1e7e34, #28a745); }
        .airplane-card.flying     { background: linear-gradient(135deg, #0062cc, #007bff); }
        .airplane-card.maintenance{ background: linear-gradient(135deg, #843910, #d35400); }
        .airplane-card.squawk     { background: linear-gradient(135deg, #7b0000, #c0392b); }

        .ac-tail   { font-size: 2.4em; font-weight: 900; letter-spacing: 3px; line-height: 1; }
        .ac-model  { font-size: 0.9em; opacity: 0.8; margin-top: 4px; }
        .ac-status-badge {
            background: rgba(255,255,255,0.25);
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 14px;
            display: inline-block;
        }
        .ac-stats {
            display: flex;
            gap: 28px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .ac-stat-label { font-size: 0.72em; opacity: 0.75; text-transform: uppercase; letter-spacing: 1px; }
        .ac-stat-value { font-size: 1.2em; font-weight: 700; margin-top: 2px; }
        .ac-actions { display: flex; flex-direction: column; gap: 10px; align-items: flex-end; }
        .ac-btn {
            padding: 10px 22px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.6);
            background: rgba(255,255,255,0.15);
            color: white;
            font-weight: 700;
            font-size: 0.9em;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            white-space: nowrap;
            transition: background 0.2s;
        }
        .ac-btn:hover { background: rgba(255,255,255,0.3); }
        .ac-btn.primary { background: rgba(255,255,255,0.9); color: #2c3e50; border-color: transparent; }
        .ac-btn.primary:hover { background: white; }

        /* Grid layout */
        .dash-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }
        @media (max-width: 768px) { .dash-grid { grid-template-columns: 1fr; } }

        /* Cards */
        .dash-card {
            background: rgba(255,255,255,0.97);
            border-radius: 14px;
            padding: 24px 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07);
            margin-bottom: 24px;
        }
        .dash-card-title {
            font-size: 0.75em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #95a5a6;
            margin-bottom: 16px;
        }

        /* Squawk list */
        .squawk-item {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            padding: 12px 0;
            border-bottom: 1px solid #f0f2f5;
        }
        .squawk-item:last-child { border-bottom: none; }
        .squawk-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #dc3545;
            margin-top: 5px;
            flex-shrink: 0;
        }
        .squawk-dot.resolved { background: #28a745; }
        .squawk-text { font-size: 0.9em; color: #2c3e50; }
        .squawk-meta { font-size: 0.78em; color: #adb5bd; margin-top: 3px; }

        /* Reservation list */
        .res-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 0;
            border-bottom: 1px solid #f0f2f5;
        }
        .res-item:last-child { border-bottom: none; }
        .res-date-box {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 10px;
            padding: 8px 12px;
            text-align: center;
            min-width: 52px;
            flex-shrink: 0;
        }
        .res-date-mon { font-size: 0.65em; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .res-date-day { font-size: 1.4em; font-weight: 900; line-height: 1; }
        .res-info { flex: 1; }
        .res-time { font-weight: 600; font-size: 0.95em; color: #2c3e50; }
        .res-who  { font-size: 0.82em; color: #7f8c8d; margin-top: 2px; }
        .res-cancel-btn {
            font-size: 0.78em;
            color: #dc3545;
            background: none;
            border: 1px solid #f5c6cb;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
        }
        .empty-state { color: #adb5bd; font-size: 0.9em; padding: 12px 0; }
    </style>
</head>
<body>
    <nav class="club-nav">
        <div class="club-nav-inner">
            <a href="dashboard.html" class="club-nav-logo">PNWAV8R</a>
            <div class="club-nav-links">
                <a href="dashboard.html" class="active">Dashboard</a>
                <a href="schedule.html">Schedule</a>
                <a href="weather.html">Weather</a>
                <a href="wb.html">W&amp;B</a>
                <span id="adminLink" style="display:none">
                    <a href="admin.html">Admin</a>
                </span>
            </div>
            <div id="navUser"></div>
        </div>
    </nav>

    <div class="page-wrap">
        <!-- Airplane status -->
        <div id="airplaneCard" class="airplane-card available">
            <div>
                <div class="ac-tail">N7798E</div>
                <div class="ac-model">1959 Cessna 150</div>
                <span class="ac-status-badge" id="acStatusBadge">Loading…</span>
                <div class="ac-stats">
                    <div>
                        <div class="ac-stat-label">Tach Time</div>
                        <div class="ac-stat-value" id="acTach">—</div>
                    </div>
                    <div>
                        <div class="ac-stat-label">Last Fuel</div>
                        <div class="ac-stat-value" id="acFuel">—</div>
                    </div>
                    <div>
                        <div class="ac-stat-label">Last Oil</div>
                        <div class="ac-stat-value" id="acOil">—</div>
                    </div>
                    <div>
                        <div class="ac-stat-label">Open Squawks</div>
                        <div class="ac-stat-value" id="acSquawks">—</div>
                    </div>
                </div>
            </div>
            <div class="ac-actions">
                <a href="schedule.html" class="ac-btn primary">Book Flight</a>
                <a href="post-flight.html" class="ac-btn" id="postFlightBtn">Post-Flight</a>
            </div>
        </div>

        <div class="dash-grid">
            <!-- Upcoming reservations -->
            <div>
                <div class="dash-card">
                    <div class="dash-card-title">Upcoming Reservations</div>
                    <div id="reservationList"><div class="empty-state">Loading…</div></div>
                </div>
            </div>

            <!-- Open squawks -->
            <div>
                <div class="dash-card">
                    <div class="dash-card-title">Open Squawks</div>
                    <div id="squawkList"><div class="empty-state">Loading…</div></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let currentMember = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const session = await requireAuth();
            if (!session) return;

            currentMember = await getCurrentMember();
            if (!currentMember) { window.location.href = '/login.html'; return; }

            renderNavUser();

            // Show admin link if admin
            if (currentMember.role === 'admin') {
                document.getElementById('adminLink').style.display = 'inline';
            }

            await Promise.all([
                loadAirplane(),
                loadReservations(),
                loadSquawks()
            ]);

            // Real-time: refresh when reservations change
            _supabase.channel('reservations')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'reservations' }, loadReservations)
                .subscribe();

            _supabase.channel('airplanes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'airplanes' }, loadAirplane)
                .subscribe();

            _supabase.channel('squawks')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'squawks' }, loadSquawks)
                .subscribe();
        });

        async function loadAirplane() {
            const { data: plane } = await _supabase
                .from('airplanes')
                .select('*')
                .eq('tail_number', AIRPLANE_TAIL)
                .single();

            if (!plane) return;

            const card  = document.getElementById('airplaneCard');
            const badge = document.getElementById('acStatusBadge');
            const statusMap = {
                available:   { cls: 'available',    label: 'Available' },
                flying:      { cls: 'flying',        label: 'In the Air' },
                maintenance: { cls: 'maintenance',   label: 'Maintenance' },
                squawk:      { cls: 'squawk',        label: 'Squawk — Grounded' }
            };
            const s = statusMap[plane.status] || statusMap.available;
            card.className = `airplane-card ${s.cls}`;
            badge.textContent = s.label;

            document.getElementById('acTach').textContent = plane.current_tach ? plane.current_tach.toFixed(1) : '—';

            // Latest flight log for fuel/oil
            const { data: log } = await _supabase
                .from('flight_logs')
                .select('fuel_added, oil_quarts_added, completed_at')
                .eq('airplane_id', plane.id)
                .order('completed_at', { ascending: false })
                .limit(1)
                .single();

            if (log) {
                document.getElementById('acFuel').textContent = log.fuel_added ? `${log.fuel_added} gal` : 'Not reported';
                document.getElementById('acOil').textContent = log.oil_quarts_added ? `${log.oil_quarts_added} qt added` : 'Not reported';
            }

            // Squawk count
            const { count } = await _supabase
                .from('squawks')
                .select('*', { count: 'exact', head: true })
                .eq('airplane_id', plane.id)
                .eq('status', 'open');
            document.getElementById('acSquawks').textContent = count ?? 0;
        }

        async function loadReservations() {
            const now = new Date().toISOString();
            const { data } = await _supabase
                .from('reservations')
                .select('*, members(name)')
                .gte('end_time', now)
                .neq('status', 'cancelled')
                .order('start_time', { ascending: true })
                .limit(10);

            const el = document.getElementById('reservationList');
            if (!data || !data.length) {
                el.innerHTML = '<div class="empty-state">No upcoming reservations.</div>';
                return;
            }

            el.innerHTML = data.map(r => {
                const start = new Date(r.start_time);
                const end   = new Date(r.end_time);
                const mon   = start.toLocaleString('en-US', { month: 'short' });
                const day   = start.getDate();
                const timeStr = `${fmtTime(start)} – ${fmtTime(end)}`;
                const isMe  = r.member_id === currentMember?.id;
                return `<div class="res-item">
                    <div class="res-date-box">
                        <div class="res-date-mon">${mon}</div>
                        <div class="res-date-day">${day}</div>
                    </div>
                    <div class="res-info">
                        <div class="res-time">${timeStr}</div>
                        <div class="res-who">${r.members?.name || '—'}${isMe ? ' <strong>(you)</strong>' : ''}</div>
                    </div>
                    ${isMe ? `<button class="res-cancel-btn" onclick="cancelReservation('${r.id}')">Cancel</button>` : ''}
                </div>`;
            }).join('');
        }

        async function loadSquawks() {
            const { data: plane } = await _supabase.from('airplanes').select('id').eq('tail_number', AIRPLANE_TAIL).single();
            if (!plane) return;

            const { data } = await _supabase
                .from('squawks')
                .select('*, members(name)')
                .eq('airplane_id', plane.id)
                .eq('status', 'open')
                .order('reported_at', { ascending: false });

            const el = document.getElementById('squawkList');
            if (!data || !data.length) {
                el.innerHTML = '<div class="empty-state">No open squawks.</div>';
                return;
            }
            el.innerHTML = data.map(s => `
                <div class="squawk-item">
                    <div class="squawk-dot"></div>
                    <div>
                        <div class="squawk-text">${s.description}</div>
                        <div class="squawk-meta">Reported by ${s.members?.name || '—'} · ${fmtDate(s.reported_at)}</div>
                    </div>
                </div>`).join('');
        }

        async function cancelReservation(id) {
            if (!confirm('Cancel this reservation?')) return;
            await _supabase.from('reservations').update({ status: 'cancelled' }).eq('id', id);
            loadReservations();
        }

        function fmtTime(d) {
            return d.toLocaleString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        }
        function fmtDate(iso) {
            return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }
    </script>
</body>
</html>
